#
# Compatibility Railway configuration for the Apex Arena backend.
#
# The recommended production setup now uses service-specific config files:
#
#   backend/deploy/railway/api.toml         public API service
#   backend/deploy/railway/chat-build.toml  finite historical chat job
#
# Configure each Railway service's custom config path in the dashboard. This
# root file is retained only as a safe API fallback for older Railway services
# that still point at repository-root railway.toml.
#
# The frontend is NOT deployed here: it runs as a separate Vercel project.

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "bash -lc 'alembic upgrade head && exec python -m app.runtime'"
# Exempt from proxy-token enforcement so the platform probe can reach it.
healthcheckPath = "/health/live"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Never raise this for a service that ingests: the OpenF1 subscription is a
# singleton guarded by a PostgreSQL advisory lease.
numReplicas = 1
