# Apex Arena OpenF1 ingestor service (RECOMMENDED PRODUCTION MODE).
#
# Owns the live MQTT subscription and the normalization pipeline. It exposes a
# minimal health server only so the platform has something to probe; it serves
# no public API and needs no public domain.
#
# SINGLETON: the process takes a PostgreSQL session-level advisory lock for its
# lifetime and refuses to start if another healthy ingestor holds it. Never
# raise numReplicas above 1 - a second replica would either fail to start or,
# through a transaction pooler, risk duplicate MQTT subscriptions.
#
# Railway service settings to set in the UI:
#   Root directory     : backend
#   Replicas           : 1  (do not increase)
#   Restart policy     : on failure
#   Region             : same region as Neon and Upstash
#   Public networking  : disabled

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m app.runtime"
healthcheckPath = "/health/live"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Required variables:
#   APP_ENV=production
#   APP_PROCESS_ROLE=ingestor
#   OPENF1_LIVE_AUTO_CONNECT=true
#   DATABASE_URL             (secret, Neon POOLED endpoint)
#   DATABASE_MIGRATION_URL   (secret, Neon DIRECT endpoint - the advisory lease
#                             is session-scoped and a transaction pooler breaks
#                             it, so the ingestor connects through this URL)
#   REDIS_URL                (secret, Upstash rediss://)
#   OPENF1_USERNAME          (secret)
#   OPENF1_PASSWORD          (secret)
#   LOG_FORMAT=json
