# Apex Arena combined service.
#
# Runs the FastAPI API and the narrow recent-session REST reconciliation worker
# in one Railway service. Deploy from main and keep replicas at 1 while worker
# duties are enabled.
#
# Railway service settings to set in the UI:
#   Root directory     : backend
#   Replicas           : 1  (MUST remain 1 - the process both serves and ingests)
#   Restart policy     : on failure
#   Region             : same region as Neon and Upstash

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m app.runtime"
healthcheckPath = "/health/live"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Required variables:
#   APP_ENV=production
#   APP_PROCESS_ROLE=combined
#   APP_BASE_PATH=/apex-arena
#   OPENF1_INGESTION_MODE=rest
#   OPENF1_LIVE_AUTO_CONNECT=false
#   RECENT_SESSION_RECONCILIATION_ENABLED=true
#   RECENT_SESSION_AUTO_BACKFILL_ENABLED=true
#   DATABASE_URL             (secret, Neon POOLED endpoint)
#   DATABASE_MIGRATION_URL   (secret, Neon DIRECT endpoint for the lease)
#   REDIS_URL                (secret, Upstash rediss://)
#   OPENF1_USERNAME / OPENF1_PASSWORD (secrets)
#   APEX_ARENA_PROXY_TOKEN   (secret, staging-specific value)
#   LOG_FORMAT=json
