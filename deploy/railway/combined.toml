# Apex Arena combined service (LOW-COST INITIAL MODE).
#
# Runs the FastAPI API and OpenF1 ingestion in ONE Railway service to halve the
# service count. Intended for staging and an early, controlled, single-instance
# beta only.
#
# IMPORTANT: settings.py rejects APP_PROCESS_ROLE=all when APP_ENV=production.
# This mode therefore requires APP_ENV=staging. That guard is deliberate - it
# stops a cost-saving staging shortcut from silently becoming the production
# topology, where a restart or scale event could duplicate MQTT ingestion.
#
# Railway service settings to set in the UI:
#   Root directory     : backend
#   Replicas           : 1  (MUST remain 1 - the process both serves and ingests)
#   Restart policy     : on failure
#   Region             : same region as Neon and Upstash

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m app.runtime"
healthcheckPath = "/health/live"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Required variables:
#   APP_ENV=staging          (production is rejected with APP_PROCESS_ROLE=all)
#   APP_PROCESS_ROLE=all
#   APP_BASE_PATH=/apex-arena
#   OPENF1_LIVE_AUTO_CONNECT=true
#   DATABASE_URL             (secret, Neon POOLED endpoint)
#   DATABASE_MIGRATION_URL   (secret, Neon DIRECT endpoint for the lease)
#   REDIS_URL                (secret, Upstash rediss://)
#   OPENF1_USERNAME / OPENF1_PASSWORD (secrets)
#   APEX_ARENA_PROXY_TOKEN   (secret, staging-specific value)
#   LOG_FORMAT=json
