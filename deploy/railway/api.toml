# Apex Arena FastAPI API service (RECOMMENDED PRODUCTION MODE).
#
# Serves HTTP + SSE only. It never subscribes to OpenF1 MQTT: settings.py
# rejects APP_PROCESS_ROLE=api together with OPENF1_LIVE_AUTO_CONNECT=true in
# production, so ingestion cannot start here by accident.
#
# Railway service settings that are not expressible here (set them in the UI):
#   Root directory     : backend
#   Replicas           : 1
#   Restart policy     : on failure
#   Region             : same region as Neon and Upstash
#   Public networking  : enabled (the Vercel frontend proxies to it)

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m app.runtime"
# Liveness is deliberately exempt from proxy-token enforcement so the platform
# probe can reach the container without traversing the public proxy.
healthcheckPath = "/health/live"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Required variables (set as Railway service variables, secrets where noted):
#   APP_ENV=production
#   APP_PROCESS_ROLE=api
#   APP_BASE_PATH=/apex-arena
#   OPENF1_LIVE_AUTO_CONNECT=false
#   DATABASE_URL             (secret, Neon POOLED endpoint)
#   REDIS_URL                (secret, Upstash rediss://)
#   APEX_ARENA_PROXY_TOKEN   (secret, must equal the Vercel frontend value)
#   INTERNAL_API_KEY         (secret)
#   PUBLIC_PROXY_HOST=chaitanyasingh.org
#   TRUSTED_PROXY_HOSTS=chaitanyasingh.org
#   CORS_ALLOWED_ORIGINS=https://chaitanyasingh.org
#   LOG_FORMAT=json
# PORT is injected by Railway and honoured by app/runtime.py.
