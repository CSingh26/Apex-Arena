# SPDX-License-Identifier: AGPL-3.0-only
name: Deploy Railway API

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "backend/deploy/railway/**"
      - "railway.toml"
      - "scripts/deploy_railway.sh"
      - ".github/workflows/deploy-railway.yml"

permissions:
  contents: read

concurrency:
  group: railway-api-production
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy apex-arena-backend
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: production
      RAILWAY_API_SERVICE: ${{ vars.RAILWAY_API_SERVICE || 'apex-arena-backend' }}
    steps:
      - uses: actions/checkout@v6

      - name: Deploy API service if Railway CLI credentials are configured
        run: |
          if [ -z "${RAILWAY_TOKEN}" ] || [ -z "${RAILWAY_PROJECT_ID}" ]; then
            echo "RAILWAY_TOKEN or RAILWAY_PROJECT_ID is not configured."
            echo "Skipping GitHub Actions Railway CLI deploy."
            echo "Use Railway's GitHub-connected auto-deploy with backend/deploy/railway/api.toml."
            exit 0
          fi
          npm install --global @railway/cli
          scripts/deploy_railway.sh api
