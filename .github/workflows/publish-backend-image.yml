# SPDX-License-Identifier: AGPL-3.0-only
name: Publish backend image

on:
  workflow_run:
    workflows:
      - Verify and publish
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, tag, or SHA to publish after manual verification
        required: false
        default: main

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-backend-${{ github.event.workflow_run.head_branch || inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build and publish tested backend image
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Check out verified source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || 'main' }}

      - name: Resolve source revision
        id: source
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set lowercase image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/apex-arena-backend" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=main
            type=raw,value=${{ steps.source.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-ghcr
          cache-to: type=gha,mode=max,scope=backend-ghcr
