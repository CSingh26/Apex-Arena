# SPDX-License-Identifier: AGPL-3.0-only
name: Verify and publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  backend:
    name: Backend quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend and test tools
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Verify formatting
        working-directory: backend
        run: ruff format --check app tests
      - name: Lint backend
        working-directory: backend
        run: ruff check app tests
      - name: Run backend tests
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Run frontend tests
        run: npm test
      - name: Build production frontend
        env:
          NEXT_PUBLIC_APP_NAME: Apex Arena
          NEXT_PUBLIC_APP_URL: http://localhost:3417
          NEXT_PUBLIC_API_URL: http://localhost:8764
        run: npm run build

  containers:
    name: Build and scan containers
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build backend verification image
        uses: docker/build-push-action@v7
        with:
          context: backend
          load: true
          tags: apex-arena-backend:verify
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend verification image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          load: true
          tags: apex-arena-frontend:verify
          build-args: |
            NEXT_PUBLIC_APP_NAME=Apex Arena
            NEXT_PUBLIC_APP_URL=http://localhost:3417
            NEXT_PUBLIC_API_URL=http://localhost:8764
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: apex-arena-backend:verify
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: apex-arena-frontend:verify
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

  end-to-end:
    name: Production end-to-end gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Prepare isolated CI environment
        run: |
          cp .env.example .env
          sed -i 's|FRONTEND_URL=http://localhost:3000|FRONTEND_URL=http://localhost:3417|' .env
          sed -i 's|BACKEND_URL=http://localhost:8000|BACKEND_URL=http://localhost:8764|' .env
          sed -i 's|FRONTEND_PORT=3000|FRONTEND_PORT=3417|' .env
          sed -i 's|BACKEND_PORT=8000|BACKEND_PORT=8764|' .env
          sed -i 's|NEXT_PUBLIC_APP_URL=http://localhost:3000|NEXT_PUBLIC_APP_URL=http://localhost:3417|' .env
          sed -i 's|NEXT_PUBLIC_API_URL=http://localhost:8000|NEXT_PUBLIC_API_URL=http://localhost:8764|' .env
          sed -i 's|CORS_ALLOWED_ORIGINS=http://localhost:3000|CORS_ALLOWED_ORIGINS=http://localhost:3417|' .env
          sed -i 's|POSTGRES_PORT=5432|POSTGRES_PORT=55432|' .env
          sed -i 's|REDIS_PORT=6379|REDIS_PORT=56379|' .env
      - name: Start production stack
        run: docker compose up -d --build --wait --wait-timeout 180
      - name: Install browser tests
        working-directory: frontend
        run: npm ci && npx playwright install --with-deps chromium
      - name: Run responsive end-to-end suite
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3417
        run: npm run test:e2e
      - name: Collect container logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=250
      - name: Stop CI stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  publish:
    name: Publish verified images to GHCR
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend, containers, end-to-end]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: backend
            context: backend
            image: ghcr.io/csingh26/apex-arena-backend
            build_args: ""
          - component: frontend
            context: frontend
            image: ghcr.io/csingh26/apex-arena-frontend
            build_args: |
              NEXT_PUBLIC_APP_NAME=Apex Arena
              NEXT_PUBLIC_APP_URL=http://localhost:3417
              NEXT_PUBLIC_API_URL=http://localhost:8764
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=sha
      - name: Publish ${{ matrix.component }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
