# SPDX-License-Identifier: AGPL-3.0-only
name: Verify and publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  backend:
    name: Backend quality gate
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://apex:test-password@localhost:5432/apex_arena
      POSTGRES_PASSWORD: test-password
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend and test tools
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Verify formatting
        working-directory: backend
        run: ruff format --check app tests
      - name: Lint backend
        working-directory: backend
        run: ruff check app tests
      - name: Run backend tests
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Run frontend tests
        run: npm test
      - name: Build production frontend
        env:
          NEXT_PUBLIC_APP_NAME: Apex Arena
          NEXT_PUBLIC_APP_URL: http://localhost:3417
          NEXT_PUBLIC_API_URL: http://localhost:8764
        run: npm run build

  containers:
    name: Build and scan containers
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build backend verification image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          load: true
          tags: apex-arena-backend:verify
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend verification image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          load: true
          tags: apex-arena-frontend:verify
          build-args: |
            NEXT_PUBLIC_APP_NAME=Apex Arena
            NEXT_PUBLIC_APP_URL=http://localhost:3417
            NEXT_PUBLIC_API_URL=http://localhost:8764
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: apex-arena-backend:verify
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: apex-arena-frontend:verify
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

  end-to-end:
    name: Production end-to-end gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Prepare isolated CI environment
        run: |
          cp .env.example .env
          sed -i 's|FRONTEND_URL=http://localhost:3000|FRONTEND_URL=http://localhost:3417|' .env
          sed -i 's|BACKEND_URL=http://localhost:8000|BACKEND_URL=http://localhost:8764|' .env
          sed -i 's|FRONTEND_PORT=3000|FRONTEND_PORT=3417|' .env
          sed -i 's|BACKEND_PORT=8000|BACKEND_PORT=8764|' .env
          sed -i 's|NEXT_PUBLIC_APP_URL=http://localhost:3000|NEXT_PUBLIC_APP_URL=http://localhost:3417|' .env
          sed -i 's|NEXT_PUBLIC_API_URL=http://localhost:8000|NEXT_PUBLIC_API_URL=http://localhost:8764|' .env
          sed -i 's|CORS_ALLOWED_ORIGINS=http://localhost:3000|CORS_ALLOWED_ORIGINS=http://localhost:3417|' .env
          sed -i 's|POSTGRES_PORT=5432|POSTGRES_PORT=55432|' .env
          sed -i 's|REDIS_PORT=6379|REDIS_PORT=56379|' .env
          sed -i 's|DEVELOPMENT_FIXTURE_ENABLED=false|DEVELOPMENT_FIXTURE_ENABLED=true|' .env
          sed -i 's|INTERNAL_API_KEY=|INTERNAL_API_KEY=apex-arena-ci-release|' .env
      - name: Start production stack
        run: docker compose up -d --build --wait --wait-timeout 180
      - name: Seed isolated replay discussion
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              --request POST \
              --header 'X-Internal-API-Key: apex-arena-ci-release' \
              http://localhost:8764/api/v1/race-rooms/sync \
              > /dev/null && \
              curl --fail --silent --show-error \
              --request POST \
              --header 'X-Internal-API-Key: apex-arena-ci-release' \
              http://localhost:8764/api/v1/race-rooms/day3-validation-room/generate \
              > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "CI replay discussion was not ready after 60 seconds"
          exit 1
      - name: Install browser tests
        working-directory: frontend
        run: npm ci && npx playwright install --with-deps chromium
      - name: Run responsive end-to-end suite
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3417
          E2E_API_URL: http://localhost:8764
          E2E_DEVELOPMENT_FIXTURE: "true"
        run: npm run test:e2e
      - name: Collect container logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=250
      - name: Stop CI stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  deployment-validation:
    name: Deployment configuration gate
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://apex:test-password@localhost:5432/apex_arena
      POSTGRES_PASSWORD: test-password
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'

      - name: Validate Railway manifests
        run: |
          python - <<'PY'
          import pathlib, sys, tomllib
          required = {"api", "ingestor", "combined"}
          found = set()
          for path in pathlib.Path("deploy/railway").glob("*.toml"):
              data = tomllib.loads(path.read_text())
              deploy = data.get("deploy", {})
              assert deploy.get("startCommand"), f"{path}: missing startCommand"
              assert deploy.get("healthcheckPath"), f"{path}: missing healthcheckPath"
              replicas = deploy.get("numReplicas")
              # A second ingestor would contend for the singleton advisory lease.
              assert replicas == 1, f"{path}: numReplicas must be 1, got {replicas}"
              found.add(path.stem)
          missing = required - found
          assert not missing, f"missing Railway manifests: {sorted(missing)}"
          print(f"validated Railway manifests: {sorted(found)}")
          PY

      - name: Validate managed datastore URL handling
        working-directory: backend
        run: |
          python - <<'PY'
          from app.core.settings import Settings

          # Neon's copy button emits libpq params that asyncpg cannot consume.
          neon = Settings(
              app_env="staging",
              database_url=(
                  "postgresql://u:p@ep-x.neon.tech/apex"
                  "?sslmode=require&channel_binding=require"
              ),
              redis_url="rediss://default:token@x.upstash.io:6379",
              postgres_password=None,
          )
          dsn = neon.async_database_url
          assert dsn.startswith("postgresql+asyncpg://"), dsn
          assert "ssl=require" in dsn and "sslmode" not in dsn, dsn
          assert "channel_binding" not in dsn, dsn
          assert neon.redis_dsn.startswith("rediss://")
          # A socket timeout under the blocking read window would flap SSE.
          assert neon.effective_redis_socket_timeout > 10
          print("managed datastore URL handling OK")
          PY

      - name: Reject unsafe production configuration
        working-directory: backend
        run: |
          python - <<'PY'
          from pydantic import ValidationError
          from app.core.settings import Settings

          # Every field is explicit: validators short-circuit on the first
          # error, so an ambient value would mask the case under test.
          base = dict(
              app_env="production",
              app_process_role="api",
              database_url="postgresql://u:p@h/apex?ssl=require",
              redis_url="rediss://default:t@h:6379",
              postgres_password=None,
              openf1_live_auto_connect=False,
              debug_ingestion_enabled=False,
              development_fixture_enabled=False,
              room_diagnostics_enabled=False,
          )

          def rejected(match: str, **overrides: object) -> None:
              try:
                  Settings(**{**base, **overrides})
              except ValidationError as exc:
                  assert match in str(exc), f"expected {match!r} in {exc}"
                  return
              raise AssertionError(f"production accepted unsafe config: {overrides}")

          rejected("APP_PROCESS_ROLE=all", app_process_role="all")
          rejected("cannot auto-connect", openf1_live_auto_connect=True)
          rejected("must use rediss", redis_url="redis://h:6379")
          rejected("must require TLS", database_url="postgresql://u:p@h/apex")
          rejected("DEBUG_INGESTION_ENABLED", debug_ingestion_enabled=True)
          rejected("DEVELOPMENT_FIXTURE_ENABLED", development_fixture_enabled=True)
          rejected("ROOM_DIAGNOSTICS_ENABLED", room_diagnostics_enabled=True)
          print("production guards OK")
          PY

      - name: Verify process roles start
        working-directory: backend
        run: |
          python - <<'PY'
          from app.core.settings import Settings
          from app.ingestor import create_ingestor_app
          from app.main import create_app

          def settings(role: str) -> Settings:
              return Settings(
                  app_env="staging",
                  app_process_role=role,
                  database_url="postgresql://u:p@pooler/apex?ssl=require",
                  # Ingesting roles require the direct endpoint for the lease.
                  database_migration_url="postgresql://u:p@direct/apex?ssl=require",
                  redis_url="rediss://default:t@h:6379",
                  postgres_password=None,
                  debug_ingestion_enabled=False,
              )

          assert create_app(settings("api")) is not None
          assert create_ingestor_app(settings("ingestor")) is not None
          assert create_app(settings("all")) is not None
          assert create_ingestor_app(settings("all")) is not None

          # The API role must not be able to masquerade as the ingestor.
          try:
              create_ingestor_app(settings("api"))
          except RuntimeError:
              print("process roles OK")
          else:
              raise AssertionError("ingestor accepted APP_PROCESS_ROLE=api")
          PY

      - name: Check deployment scripts
        run: |
          bash -n scripts/run-production-migrations.sh
          bash -n scripts/smoke-test-deployment.sh
          # Must fail closed when no database URL is present.
          if (unset DATABASE_URL DATABASE_MIGRATION_URL; \
              scripts/run-production-migrations.sh --check >/dev/null 2>&1); then
            echo "migration script did not fail closed without a DSN" && exit 1
          fi
          echo "deployment scripts OK"

      - name: Scan tracked files for credentials
        run: |
          # Placeholder templates are tracked; real secrets must never be.
          if git ls-files | grep -E '^\.env$|^\.env\.(local|production|staging)$'; then
            echo "a real .env file is tracked" && exit 1
          fi
          if git grep -nIE '(sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----)' \
             -- . ':!*.lock' ':!package-lock.json'; then
            echo "possible credential committed" && exit 1
          fi
          echo "no credentials found in tracked files"

      - name: Check documentation links
        run: |
          python - <<'PY'
          import pathlib, re, sys

          broken = []
          for doc in pathlib.Path("docs").rglob("*.md"):
              text = doc.read_text(encoding="utf-8")
              for target in re.findall(r"\]\((?!https?://|#|mailto:)([^)#]+)", text):
                  candidate = (doc.parent / target.strip()).resolve()
                  repo_relative = pathlib.Path.cwd().resolve()
                  if not candidate.exists():
                      alt = (repo_relative / target.strip().lstrip("/")).resolve()
                      if not alt.exists():
                          broken.append(f"{doc}: {target}")
          if broken:
              print("broken documentation links:")
              print("\n".join(broken))
              sys.exit(1)
          print("documentation links OK")
          PY

  deploy-railway:
    name: Deploy backend to Railway (opt-in)
    needs: [backend, frontend, containers, end-to-end, deployment-validation]
    # Disabled until the repository variable is explicitly set to "true".
    if: github.ref == 'refs/heads/main' && vars.RAILWAY_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
      - name: Confirm deployment credentials are present
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "RAILWAY_TOKEN is not configured; refusing to deploy." && exit 1
          fi
          echo "Railway deployment credentials present."
      # Deployment steps are intentionally left unimplemented until the Railway
      # project exists. See docs/railway-deployment-runbook.md.
      - name: Deployment placeholder
        run: |
          echo "Railway services are not provisioned yet."
          echo "Follow docs/railway-deployment-runbook.md before enabling this job."
          exit 1

  deploy-vercel-frontend:
    name: Deploy Apex Arena frontend to Vercel (opt-in)
    needs: [backend, frontend, containers, end-to-end, deployment-validation]
    if: github.ref == 'refs/heads/main' && vars.VERCEL_APEX_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
      - name: Confirm deployment credentials are present
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "VERCEL_TOKEN is not configured; refusing to deploy." && exit 1
          fi
          echo "Vercel deployment credentials present."
      - name: Deployment placeholder
        run: |
          echo "The Apex Arena Vercel project is not provisioned yet."
          echo "Follow docs/apex-arena-vercel-deployment.md before enabling this job."
          exit 1

  publish:
    name: Publish verified images to GHCR
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend, containers, end-to-end, deployment-validation]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: backend
            context: .
            dockerfile: backend/Dockerfile
            image: ghcr.io/csingh26/apex-arena-backend
            build_args: ""
          - component: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image: ghcr.io/csingh26/apex-arena-frontend
            build_args: |
              NEXT_PUBLIC_APP_NAME=Apex Arena
              NEXT_PUBLIC_APP_URL=http://localhost:3417
              NEXT_PUBLIC_API_URL=http://localhost:8764
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Sign in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v') || matrix.component == 'backend'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate container metadata
        if: startsWith(github.ref, 'refs/tags/v') || matrix.component == 'backend'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' && matrix.component == 'backend' }}
            type=raw,value=${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' && matrix.component == 'backend' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
      - name: Publish ${{ matrix.component }} image
        if: startsWith(github.ref, 'refs/tags/v') || matrix.component == 'backend'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
