# Railway config for the Apex Arena API service.
#
# Railway source root: repository root
# Dockerfile path     : backend/Dockerfile
# Container WORKDIR   : /app
#
# This service serves HTTP/SSE only. It must not run historical chat jobs.

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"
watchPatterns = [
  "backend/app/**",
  "backend/migrations/**",
  "backend/scripts/**",
  "backend/pyproject.toml",
  "backend/Dockerfile",
  "backend/deploy/railway/api.toml",
  "railway.toml",
]

[deploy]
startCommand = "bash -lc 'alembic upgrade head && exec python -m app.runtime'"
healthcheckPath = "/health/live"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
