# Railway config for the Apex Arena API service.
#
# Railway Root Directory: /backend
# Dockerfile path       : Dockerfile
# Container WORKDIR   : /app
#
# This service serves HTTP/SSE only. It must not run historical chat jobs.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "app/**",
  "migrations/**",
  "scripts/**",
  "pyproject.toml",
  "Dockerfile",
  "deploy/railway/api.toml",
]

[deploy]
startCommand = "bash -lc 'alembic upgrade head && exec python -m app.runtime'"
healthcheckPath = "/health/live"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
