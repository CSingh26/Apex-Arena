# Railway config for the finite historical race-room chat build job.
#
# Railway source root: repository root
# Dockerfile path     : backend/Dockerfile
# Container WORKDIR   : /app
#
# This service is intentionally inert unless RUN_ROOM_CHAT_BUILD=true.

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"
watchPatterns = [
  "backend/app/**",
  "backend/migrations/**",
  "backend/scripts/**",
  "backend/pyproject.toml",
  "backend/Dockerfile",
  "backend/deploy/railway/chat-build.toml",
]

[deploy]
startCommand = "bash -lc 'if [ \"${RUN_ROOM_CHAT_BUILD:-false}\" = \"true\" ]; then exec bash scripts/build_2026_rooms_and_chats.sh; else echo \"Historical chat job disabled\"; exit 0; fi'"
restartPolicyType = "NEVER"
restartPolicyMaxRetries = 0
numReplicas = 1
